@if (open()) {
  <div class="backdrop" (click)="closed.emit()">
    <section class="modal" (click)="$event.stopPropagation()">
      <header>
        <h2>{{ title() }}</h2>
        <button class="btn btn-ghost" type="button" (click)="closed.emit()" aria-label="Close">x</button>
      </header>
      <ng-content />
    </section>
  </div>
}
