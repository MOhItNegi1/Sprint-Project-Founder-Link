<div class="shell" [class.menu-open]="menuOpen()">
  <aside class="sidebar">
    <a class="brand" routerLink="/dashboard">
      <span class="material-symbols-outlined">account_balance</span>
      <div>
        <strong>Founder Link</strong>
        <small>Institutional Portal</small>
      </div>
    </a>

    <nav>
      @for (item of nav; track item.path) {
        @if (canShow(item)) {
          <a [routerLink]="item.path" routerLinkActive="active" (click)="menuOpen.set(false)">
            <span class="material-symbols-outlined nav-icon">{{ item.icon }}</span>
            {{ item.label }}
          </a>
        }
      }
    </nav>
  </aside>

  <div class="content">
    <header class="topbar">
      <button class="icon-btn menu-btn material-symbols-outlined" type="button" (click)="menuOpen.set(!menuOpen())" aria-label="Toggle navigation">menu</button>
      <div class="spacer" style="flex: 1;"></div>
      <div class="top-actions">
        <button class="icon-btn material-symbols-outlined" type="button" (click)="theme.toggle()" aria-label="Toggle dark mode">{{ theme.darkMode() ? 'light_mode' : 'dark_mode' }}</button>
        <a class="icon-btn material-symbols-outlined" routerLink="/notifications" aria-label="Notifications">notifications</a>
        <a class="profile-chip" routerLink="/profile">
          <span>{{ initials() }}</span>
          <b>{{ auth.email() }}</b>
        </a>
        <button class="btn btn-danger" type="button" (click)="auth.logout()">Logout</button>
      </div>
    </header>

    <main [@routeFade]="outlet.activatedRouteData">
      <router-outlet #outlet="outlet" />
    </main>
  </div>
</div>
