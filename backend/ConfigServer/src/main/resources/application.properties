spring.application.name=CONFIG-SERVER

server.port=8888

spring.cloud.config.server.git.uri=${CONFIG_GIT_URI:https://github.com/MOhItNegi1/FounderLink-ConfigServer-Final}
spring.cloud.config.server.git.default-label=${CONFIG_GIT_DEFAULT_LABEL:main}
spring.cloud.config.server.git.clone-on-start=true
spring.cloud.config.server.git.force-pull=true

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
