spring.application.name=founderlink-data-seeder

# Auth database is the primary Spring Data JPA datasource.
# These defaults match this repository's docker-compose.yml port mappings.
# If your Postgres is exposed on localhost:5432, change the ports below to 5432.
spring.datasource.url=jdbc:postgresql://localhost:5433/founderlink_auth?options=-c%20TimeZone=Asia/Kolkata
spring.datasource.username=postgres
spring.datasource.password=9999
spring.datasource.driver-class-name=org.postgresql.Driver

founderlink.datasource.startup.url=jdbc:postgresql://localhost:5434/founderlink_startup?options=-c%20TimeZone=Asia/Kolkata
founderlink.datasource.investment.url=jdbc:postgresql://localhost:5435/founderlink_investment?options=-c%20TimeZone=Asia/Kolkata
founderlink.datasource.notification.url=jdbc:postgresql://localhost:5436/founderlink_notification?options=-c%20TimeZone=Asia/Kolkata

spring.jackson.time-zone=Asia/Kolkata
founderlink.datasource.username=postgres
founderlink.datasource.password=9999

# Important: the seeder must never create, update, or drop schema.
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=never
spring.jpa.open-in-view=false
spring.main.web-application-type=none

# All generated accounts use this password unless overridden.
founderlink.seed.password=Password@123
